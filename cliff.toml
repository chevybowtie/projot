# git-cliff configuration for projot
# Generates release notes from conventional commits

[changelog]
# changelog header
header = """
# Changelog

All notable changes to this project will be documented in this file.\n
"""

# template for the changelog body
body = """
{% if version %}\
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper }}
{% for commit in commits %}
- {% if commit.breaking %}**BREAKING:** {% endif %}{{ commit.message | upper_first }}{% if commit.body %} ([#{{ commit.id | truncate(length=7, end="") }}](https://github.com/chevybowtie/projot/commit/{{ commit.id }})){% endif %}
{%- endfor %}
{% endfor %}\n
"""

# template for the changelog footer
footer = """
<!-- generated by git-cliff -->
"""

# trim the changelog
trim = true

[git]
# regex for parsing conventional commits
conventional_commits = true
filter_unconventional = true
split_commits = false

# commit parsers
[[git.commit_parsers]]
message = "^feat"
group = "Features"

[[git.commit_parsers]]
message = "^fix"
group = "Bug Fixes"

[[git.commit_parsers]]
message = "^doc"
group = "Documentation"

[[git.commit_parsers]]
message = "^perf"
group = "Performance"

[[git.commit_parsers]]
message = "^refactor"
group = "Refactoring"

[[git.commit_parsers]]
message = "^test"
group = "Testing"

[[git.commit_parsers]]
message = "^chore"
skip = true

[[git.commit_parsers]]
message = "^ci"
skip = true

# filter out the commits that are not matched by commit parsers
default_scope = "Other"
